name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Run pipeline
        run: |
          nextflow run main.nf -profile standard --outdir ci_results

      - name: Check outputs exist
        run: |
          test -f ci_results/chunks/chunks.csv
          test -f ci_results/candidates/candidates.csv
          test -f ci_results/scores/scored_candidates.csv
          test -f ci_results/selected/top_designs.csv
          test -f ci_results/qc/qc_metrics.csv
          test -f ci_results/gene_summary/gene_summary.csv
          test -f ci_results/report/report.txt